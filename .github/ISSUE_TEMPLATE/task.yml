name: Task
description: Create a new task for backlog tracking
title: "short description"
labels: []
assignees: []

body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - feature
        - fix
        - chore
        - docs
        - refactor
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short description of the task
    validations:
      required: true

  - type: markdown
    id: objective
    attributes:
      label: Objective
      description: What must be true when this is complete
      placeholder: |
        - 
        - 

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: Implementation completed
        - label: Tests added or updated
        - label: Lint passes
        - label: Build passes
        - label: PR linked
