name: Issue
description: Create a new issue for fixing.
title: "[Issue]: "
labels: [thestral, bug]
assignees: []
type: bug
body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - hotfix
        - bug
        - refactor
    validations:
      required: true

  - type: textarea
    id: objective
    attributes:
       label: What needs to be fixed
    validations:
      required: true

  - type: textarea
    id: issue-proof
    attributes:
       label: Issue screenshots or logs
       
  - type: checkboxes
    id: checklist
    attributes:
      label: I have done the following
      options:
        - label: Fixed the issue
        - label: Tested locally
